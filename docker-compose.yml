services:
  easynote:
    build: .
    ports:
      - "3000:3000"
    environment:
      # AI provider — Anthropic Claude by default…
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - ANTHROPIC_MODEL=${ANTHROPIC_MODEL:-claude-opus-4-8}
      # …or a cheaper OpenAI-compatible provider (DeepSeek/GLM/Qwen/Kimi/…)
      - AI_PROVIDER=${AI_PROVIDER:-}
      - AI_BASE_URL=${AI_BASE_URL:-}
      - AI_API_KEY=${AI_API_KEY:-}
      - AI_MODEL=${AI_MODEL:-}
      - AI_VISION_MODEL=${AI_VISION_MODEL:-}
      # Optional: speech-to-text for uploaded audio/video
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - STT_API_KEY=${STT_API_KEY:-}
      - STT_BASE_URL=${STT_BASE_URL:-}
      - STT_MODEL=${STT_MODEL:-}
      # Public URL of the deployment (used for SEO + share links)
      - APP_URL=${APP_URL:-http://localhost:3000}
    volumes:
      - easynote-data:/data
    restart: unless-stopped

volumes:
  easynote-data:
