services:
  easynote:
    build: .
    ports:
      - "3000:3000"
    environment:
      # Required for AI features (notes, flashcards, quiz, chat, translation)
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      # Optional: Claude model override
      - ANTHROPIC_MODEL=${ANTHROPIC_MODEL:-claude-opus-4-8}
      # Optional: speech-to-text for uploaded audio/video
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - STT_API_KEY=${STT_API_KEY:-}
      - STT_BASE_URL=${STT_BASE_URL:-}
      - STT_MODEL=${STT_MODEL:-}
      # Public URL of the deployment (used for SEO + share links)
      - APP_URL=${APP_URL:-http://localhost:3000}
    volumes:
      - easynote-data:/data
    restart: unless-stopped

volumes:
  easynote-data:
